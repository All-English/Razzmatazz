services:
  razzmatazz:
    image: ghcr.io/all-english/razzmatazz:latest
    container_name: razzmatazz
    restart: unless-stopped
    init: true
    ports:
      - "3050:3000"
    volumes:
      - razzmatazz-config:/app/config
    environment:
      - MANAGER_PASSWORD=${MANAGER_PASSWORD:-PASSWORD}
    # - APP_DOMAIN=https://razzmatazz.example.com


volumes:
  razzmatazz-config:
